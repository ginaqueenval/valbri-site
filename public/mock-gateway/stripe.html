<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stripe Mock Checkout</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0a1224;
        color: #f7f8ff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(135deg, rgba(99, 91, 255, 0.18), transparent 34%),
          #0a1224;
      }
      main {
        width: min(460px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: #111a2f;
        box-shadow: 0 22px 58px rgba(0, 0, 0, 0.34);
        overflow: hidden;
      }
      header {
        padding: 24px 28px 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .brand {
        color: #ffffff;
        font-size: 30px;
        font-weight: 800;
        letter-spacing: 0;
      }
      .brand span {
        color: #635bff;
      }
      section {
        padding: 24px 28px 28px;
      }
      .label {
        margin: 0 0 8px;
        color: #9ba8c7;
        font-size: 13px;
      }
      .order {
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 15px;
        color: #ffffff;
        overflow-wrap: anywhere;
      }
      .notice {
        margin: 20px 0;
        border: 1px solid rgba(99, 91, 255, 0.24);
        border-radius: 8px;
        background: rgba(99, 91, 255, 0.12);
        padding: 14px;
        color: #c5cdeb;
        font-size: 14px;
        line-height: 1.55;
      }
      .actions {
        display: grid;
        gap: 12px;
      }
      button {
        min-height: 48px;
        border: 0;
        border-radius: 6px;
        padding: 0 18px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }
      .confirm {
        background: #635bff;
        color: #ffffff;
      }
      .cancel {
        background: rgba(255, 255, 255, 0.1);
        color: #eef2ff;
      }
      .error {
        display: none;
        margin-top: 14px;
        color: #ffb4ab;
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="brand"><span>stripe</span> checkout</div>
      </header>
      <section>
        <p class="label">Mock checkout order</p>
        <p class="order" id="orderNo">Loading...</p>
        <div class="notice">
          This is a local Stripe simulation. Confirm or cancel to return to the player site through the same success and cancel pages used by the real flow.
        </div>
        <div class="actions">
          <button class="confirm" id="confirmButton" type="button">Pay now</button>
          <button class="cancel" id="cancelButton" type="button">Cancel payment</button>
        </div>
        <div class="error" id="errorBox"></div>
      </section>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const orderNo = params.get("orderNo");
      const orderEl = document.getElementById("orderNo");
      const errorBox = document.getElementById("errorBox");
      const confirmButton = document.getElementById("confirmButton");
      const cancelButton = document.getElementById("cancelButton");

      orderEl.textContent = orderNo || "Missing order number";
      confirmButton.disabled = !orderNo;
      cancelButton.disabled = !orderNo;

      function setBusy(isBusy) {
        confirmButton.disabled = isBusy || !orderNo;
        cancelButton.disabled = isBusy || !orderNo;
      }

      function showError(message) {
        errorBox.textContent = message;
        errorBox.style.display = "block";
      }

      function getStoredPlayerToken() {
        return (
          localStorage.getItem("player_token") ||
          sessionStorage.getItem("player_token")
        );
      }

      async function submitMockPayment(endpoint, targetPath) {
        const token = getStoredPlayerToken();
        if (!token) {
          showError("Login session is missing. Please return to the player site and sign in again.");
          return;
        }

        setBusy(true);
        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Player-Token": token,
            },
            body: JSON.stringify({ orderNo }),
          });
          const data = await response.json();
          if (!response.ok || data.code !== 200) {
            throw new Error(data.msg || "Payment simulation failed");
          }
          window.location.href = targetPath + "?orderNo=" + encodeURIComponent(orderNo);
        } catch (error) {
          showError(error.message || "Payment simulation failed");
          setBusy(false);
        }
      }

      confirmButton.addEventListener("click", () => {
        submitMockPayment("/api/payment/mock/success", "/#/payment/success");
      });
      cancelButton.addEventListener("click", () => {
        submitMockPayment("/api/payment/mock/cancel", "/#/payment/cancel");
      });
    </script>
  </body>
</html>
